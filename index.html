<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>山菜図鑑</title>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="site-header">
        <button class="brand-button" type="button" data-route="#/">
          <span class="brand-mark">山</span>
          <span>
            <strong>山菜図鑑</strong>
            <small>採る、記録する、出会う</small>
          </span>
        </button>
      </header>

      <main id="app" class="view" aria-live="polite"></main>
    </div>

    <div id="unlockOverlay" class="unlock-overlay" hidden>
      <div class="card-reveal">
        <span class="shine"></span>
        <img id="unlockImage" src="assets/koshiabura-chibi.png" alt="解放された山菜少女のカード">
        <p id="unlockText">山菜少女 解放</p>
      </div>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
